<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBD Hub - Fondation Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #1C1C1E; --blue: #0A84FF; --green: #30D158; --red: #FF453A; --orange: #FF9F0A; --purple: #BF5AF2; --text: #FFF; --sub: #8E8E93; --border: #2C2C2E; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: rgba(18,18,18,0.9); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; z-index: 1000; }
        .tab-btn { flex: 1; border: none; background: none; color: var(--sub); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; }
        .tab-btn.active { color: var(--blue); font-weight: bold; }
        .content-section { display: none; padding: 15px; }
        .content-section.active { display: block; }
        .card { background: var(--card); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        h2 { font-size: 11px; color: var(--sub); text-transform: uppercase; margin: 0 0 12px 0; letter-spacing: 0.8px; }
        .sbd-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .rm-box { padding: 10px; border-radius: 10px; background: #262629; }
        .rm-val { font-size: 16px; font-weight: 900; color: var(--blue); }
        .rm-target { font-size: 10px; color: var(--sub); }
        input, select, textarea { width: 100%; background: #262629; border: 1px solid #3A3A3C; color: white; border-radius: 8px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: var(--blue); border: none; color: white; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .supp-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="tab-dash" class="content-section active">
        <div class="card">
            <h2>Performance SBD (Estimé vs Visé)</h2>
            <div class="sbd-grid" id="sbdDisplay"></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2>Suppléments</h2>
                <select id="daySelect" style="width:120px; margin:0;" onchange="renderDash()">
                    <option value="Lundi">Lundi</option><option value="Mardi">Mardi</option>
                    <option value="Mercredi">Mercredi</option><option value="Jeudi">Jeudi</option>
                    <option value="Vendredi">Vendredi</option><option value="Samedi">Samedi</option>
                    <option value="Dimanche">Dimanche</option>
                </select>
            </div>
            <div id="dashSupps"></div>
        </div>
    </div>

    <div id="tab-train" class="content-section">
        <div class="card">
            <h2>Import Hevy</h2>
            <textarea id="hevyPaste" placeholder="Colle ta séance..."></textarea>
            <button class="btn" onclick="processHevy()">Analyser la séance</button>
        </div>
        <div id="trainingLogs"></div>
    </div>

    <div id="tab-stats" class="content-section">
        <div class="card">
            <h2>Volume & Progression</h2>
            <canvas id="chartTonnage" height="200"></canvas>
        </div>
    </div>

    <div id="tab-settings" class="content-section">
        <div class="card">
            <h2>Profil</h2>
            <label style="font-size: 12px; color: var(--sub);">Poids de corps (kg)</label>
            <input type="number" id="inputBW">
            <button class="btn" onclick="saveSettings()">Sauvegarder</button>
        </div>
        <div class="card">
            <h2>Data Sync (Manuel)</h2>
            <input type="password" id="syncToken" placeholder="GitHub Token">
            <input type="text" id="syncGistId" placeholder="Gist ID">
            <button class="btn" style="background: var(--green);" onclick="saveKeys()">Sauver les clés</button>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn" style="flex:1; background:var(--purple)" onclick="cloudPush()">Push</button>
                <button class="btn" style="flex:1; background:var(--orange)" onclick="cloudPull()">Pull</button>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <button class="tab-btn active" onclick="showTab('tab-dash')">🏆 Dash</button>
        <button class="tab-btn" onclick="showTab('tab-train')">🏋️ Train</button>
        <button class="tab-btn" onclick="showTab('tab-stats')">📊 Stats</button>
        <button class="tab-btn" onclick="showTab('tab-settings')">⚙️ Settings</button>
    </nav>

<script>
let keys = JSON.parse(localStorage.getItem('SBD_KEYS')) || { token: "", gistId: "" };
let db = JSON.parse(localStorage.getItem('SBD_HUB_V26')) || {
    user: { bw: 80, targets: { bench: 100, squat: 120, deadlift: 140 } },
    logs: [],
    bestPR: { bench: 0, squat: 0, deadlift: 0 }
};

function saveDB() { localStorage.setItem('SBD_HUB_V26', JSON.stringify(db)); }

function showTab(id) {
    document.querySelectorAll('.content-section, .tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    if (id === 'tab-dash') renderDash();
    if (id === 'tab-stats') renderStats();
}

function updateTargets() {
    ['bench', 'squat', 'deadlift'].forEach(lift => {
        if (db.bestPR[lift] >= db.user.targets[lift]) {
            db.user.targets[lift] = Math.round(db.bestPR[lift] + 2.5);
        }
    });
}

function processHevy() {
    const text = document.getElementById('hevyPaste').value;
    if(!text) return;
    const lines = text.split('\n');
    let session = { date: new Date().toLocaleDateString('fr-FR'), exercises: [] };
    let currExo = null;

    lines.forEach(line => {
        let l = line.trim();
        if(l.startsWith("série")) {
            let m = l.match(/(\d+\.?\d*)\s*kg\s*x\s*(\d+)/i);
            if(m && currExo) {
                let w = parseFloat(m[1]), r = parseInt(m[2]);
                let rm = r <= 1 ? w : Math.round(w / (1.0278 - (0.0278 * r)));
                if(rm > currExo.maxRM) currExo.maxRM = rm;
            }
        } else if(l && !l.includes('kg x') && !l.includes('Hevy')) {
            if(currExo) session.exercises.push(currExo);
            currExo = { name: l, maxRM: 0 };
        }
    });
    if(currExo) session.exercises.push(currExo);

    session.exercises.forEach(exo => {
        let n = exo.name.toLowerCase();
        let type = n.includes("bench") ? "bench" : (n.includes("squat") ? "squat" : (n.includes("deadlift") ? "deadlift" : null));
        if(type && exo.maxRM > db.bestPR[type]) db.bestPR[type] = exo.maxRM;
    });

    db.logs.unshift(session);
    updateTargets();
    saveDB();
    renderDash();
    renderDayList();
    document.getElementById('hevyPaste').value = "";
    alert("Séance analysée !");
}

function renderDash() {
    const day = document.getElementById('daySelect').value;
    document.getElementById('sbdDisplay').innerHTML = ['bench', 'squat', 'deadlift'].map(k => `
        <div class="rm-box">
            <div style="font-size:9px; color:var(--sub);">${k.toUpperCase()}</div>
            <div class="rm-val">${db.bestPR[k]}<small>kg</small></div>
            <div class="rm-target">Visé: ${db.user.targets[k]}</div>
            <div style="font-size:10px; color:var(--blue); margin-top:4px;">x${(db.bestPR[k]/db.user.bw).toFixed(2)}</div>
        </div>
    `).join('');

    const isSalle = ["Lundi","Mardi","Jeudi","Vendredi","Samedi"].includes(day);
    let html = '';
    if(["Lundi","Mardi","Jeudi"].includes(day)) html += `<div class="supp-item"><span>Work! (Pré)</span><span style="color:var(--orange)">10g</span></div>`;
    if(day === "Samedi") html += `<div class="supp-item"><span>Endurance Infini</span><span style="color:var(--orange)">1 Scoop</span></div>`;
    html += `<div class="supp-item"><span>Articulations</span><span style="color:var(--purple)">${isSalle?'20g':'10g'}</span></div>`;
    html += `<div class="supp-item"><span>Créatine / Glycine</span><span>5g / 10g</span></div>`;
    html += `<div class="supp-item"><span>ZMB (Coucher)</span><span>3 caps</span></div>`;
    document.getElementById('dashSupps').innerHTML = html;
}

function renderDayList() {
    document.getElementById('trainingLogs').innerHTML = db.logs.slice(0, 5).map(log => `
        <div class="card">
            <h2>${log.date}</h2>
            ${log.exercises.filter(e => e.maxRM > 0).map(exo => `
                <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;">
                    <span>${exo.name}</span><span style="color:var(--blue)">Max: ${exo.maxRM}kg</span>
                </div>
            `).join('')}
        </div>`).join('');
}

async function cloudPush() {
    if (!keys.token || !keys.gistId) return alert("Clés manquantes");
    await fetch(`https://api.github.com/gists/${keys.gistId}`, {
        method: 'PATCH',
        headers: { 'Authorization': `token ${keys.token}` },
        body: JSON.stringify({ files: { "sbd_hub_data.json": { content: JSON.stringify(db) } } })
    });
    alert("Sync OK (Push)");
}

async function cloudPull() {
    if (!keys.token || !keys.gistId) return alert("Clés manquantes");
    const res = await fetch(`https://api.github.com/gists/${keys.gistId}`);
    const data = await res.json();
    db = JSON.parse(data.files["sbd_hub_data.json"].content);
    saveDB(); location.reload();
}

function saveKeys() {
    keys.token = document.getElementById('syncToken').value;
    keys.gistId = document.getElementById('syncGistId').value;
    localStorage.setItem('SBD_KEYS', JSON.stringify(keys));
    alert("Clés sauvées");
}

function saveSettings() {
    db.user.bw = parseFloat(document.getElementById('inputBW').value);
    saveDB(); renderDash(); alert("Profil mis à jour");
}

window.onload = () => {
    const today = new Intl.DateTimeFormat('fr-FR', { weekday: 'long' }).format(new Date());
    document.getElementById('daySelect').value = today.charAt(0).toUpperCase() + today.slice(1);
    document.getElementById('inputBW').value = db.user.bw;
    document.getElementById('syncToken').value = keys.token;
    document.getElementById('syncGistId').value = keys.gistId;
    renderDash(); renderDayList();
};
</script>
</body>
</html>
