<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A84FF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --blue: #0A84FF;
      --green: #32D74B;
      --orange: #FF9F0A;
      --red: #FF453A;
      --purple: #BF5AF2;
      --teal: #64D2FF;
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.1);
      --text: #E5E5EA;
      --sub: #7878A8;
      --accent: #0A84FF;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0F0F14;
      color: var(--text);
      margin: 0;

    }
    /* ... (le reste du CSS existant) ... */
  </style>
</head>
<body>
  <div id="app"></div>
  
  <!-- Chargement des modules ES6 avec type="module" -->
  <script type="module">
    import { STORAGE_KEY, DAYS_FULL, DEFAULT_ROUTINE, SESSION_NAME_BLACKLIST } from './js/constants.js';
    import {
      generateId, timeAgo, showToast, showModal, clearCaches, saveDB, saveDBNow, _flushDB,
      formatDate, getTodayStr, calcE1RM, t, shouldShow
    } from './js/utils.js';
    
    // Chargement dynamique de app.js (module principal)
    import('./js/app.js').then(module => {
      window.app = module;
      console.log('Application chargée avec succès !');
    }).catch(err => {
      console.error('Erreur de chargement :', err);
      document.body.innerHTML = '<div style="color:red;padding:20px;">Erreur de chargement de l\'application. Voir la console.</div>';
    });
  </script>
</body>
</html>
