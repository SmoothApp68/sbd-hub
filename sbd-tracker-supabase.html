<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBD Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui; background: #000; color: #F5F5F7; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: #151517; border: 1px solid #2C2C2E; border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        h1 { text-align: center; margin-bottom: 20px; }
        input, textarea { width: 100%; background: #1C1C1E; border: 1px solid #3A3A3C; color: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; font-size: 14px; font-family: inherit; }
        button { width: 100%; background: #0A84FF; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
        button:hover { background: #0077E6; }
        .red { background: #FF453A; }
        .red:hover { background: #E63A32; }
        .green { background: #32D74B; color: #000; }
        .green:hover { background: #2CC241; }
        #authScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        #app { display: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #32D74B; color: #000; padding: 12px 20px; border-radius: 20px; z-index: 999; }
    </style>
</head>
<body>

<div class="container">
    <div id="authScreen">
        <div class="card" style="width: 100%;">
            <h1>🏋️ SBD Tracker</h1>
            <input type="email" id="email" placeholder="Email" />
            <input type="password" id="password" placeholder="Mot de passe (6+ caractères)" />
            <button onclick="login()">Se connecter</button>
            <button onclick="signup()" style="background: #666;">Créer un compte</button>
        </div>
    </div>

    <div id="app">
        <h1>🏋️ SBD Tracker</h1>
        
        <div class="card">
            <h3 style="margin-bottom: 15px;">Performance</h3>
            <div id="display" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;"></div>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom: 15px;">Importer Séance Hevy</h3>
            <textarea id="hevyText" rows="6" placeholder="Colle ton export Hevy ici..."></textarea>
            <button onclick="importHevy()">Importer Séance</button>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom: 15px;">Paramètres</h3>
            <button class="green" onclick="sync()">🔄 Synchroniser</button>
            <button class="red" onclick="logout()">Déconnexion</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://pjofduekgcfwnfienejn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqb2ZkdWVrZ2Nmd25maWVuZWpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTEwNzkyODAsImV4cCI6MjAyNjQ0OTI4MH0.rAXtZ1y3ebj2ZWnDigrnUWcm7iwpgfts0AeRD0PmxWo';

let supabaseClient;
let currentUser = null;
let data = { bestPR: { bench: 0, squat: 0, deadlift: 0 }, logs: [] };

async function init() {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const session = await supabaseClient.auth.getSession();
    if (session.data.session) {
        currentUser = session.data.session.user;
        showApp();
        await loadData();
    }
}

async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    
    if (!email || !password) {
        toast('❌ Remplis tous les champs');
        return;
    }
    
    try {
        const res = await supabaseClient.auth.signInWithPassword({ email, password });
        if (res.error) {
            toast('❌ ' + res.error.message);
            return;
        }
        currentUser = res.data.user;
        showApp();
        await loadData();
        toast('✅ Connecté !');
    } catch (e) {
        toast('❌ Erreur: ' + e.message);
    }
}

async function signup() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    
    if (!email || !password) {
        toast('❌ Remplis tous les champs');
        return;
    }
    
    if (password.length < 6) {
        toast('❌ 6 caractères minimum');
        return;
    }
    
    try {
        const res = await supabaseClient.auth.signUp({ email, password });
        if (res.error) {
            toast('❌ ' + res.error.message);
            return;
        }
        toast('✅ Compte créé ! Connecte-toi');
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
    } catch (e) {
        toast('❌ ' + e.message);
    }
}

async function loadData() {
    try {
        const { data: sessions } = await supabaseClient
            .from('training_sessions')
            .select('*')
            .eq('user_id', currentUser.id);
        
        if (sessions) {
            data.logs = sessions;
            calculateBestPRs();
            render();
        }
    } catch (e) {
        console.error(e);
    }
}

function calculateBestPRs() {
    data.bestPR = { bench: 0, squat: 0, deadlift: 0 };
    data.logs.forEach(log => {
        (log.exercises || []).forEach(exo => {
            const name = (exo.name || '').toLowerCase();
            if (name.includes('bench') || name.includes('couché')) {
                data.bestPR.bench = Math.max(data.bestPR.bench, exo.maxRM || 0);
            } else if (name.includes('squat')) {
                data.bestPR.squat = Math.max(data.bestPR.squat, exo.maxRM || 0);
            } else if (name.includes('deadlift') || name.includes('soulevé')) {
                data.bestPR.deadlift = Math.max(data.bestPR.deadlift, exo.maxRM || 0);
            }
        });
    });
}

function render() {
    document.getElementById('display').innerHTML = ['bench', 'squat', 'deadlift'].map(k => `
        <div style="background: #1C1C1E; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #2C2C2E;">
            <div style="font-size: 11px; color: #86868B; margin-bottom: 6px;">${k.toUpperCase()}</div>
            <div style="font-size: 28px; font-weight: 800; color: #0A84FF;">${data.bestPR[k]}</div>
            <div style="font-size: 10px; color: #86868B; margin-top: 4px;">kg</div>
        </div>
    `).join('');
}

async function importHevy() {
    const text = document.getElementById('hevyText').value;
    if (!text) {
        toast('❌ Colle du texte');
        return;
    }
    
    try {
        const lines = text.split('\n');
        const session = {
            user_id: currentUser.id,
            session_id: 'sess_' + Date.now(),
            date: new Date().toLocaleDateString('fr-FR'),
            short_date: new Date().toLocaleDateString('fr-FR'),
            timestamp: Date.now(),
            volume: 0,
            title: 'Séance',
            day: 'Entraînement',
            exercises: []
        };
        
        let currentExo = null;
        lines.forEach(line => {
            const l = line.trim().toLowerCase();
            if (!l || l.includes('hevy')) return;
            
            const match = l.match(/(\d+\.?\d*)\s*kg\s*x\s*(\d+)/);
            
            if (match) {
                const w = parseFloat(match[1]);
                const r = parseInt(match[2]);
                
                if (!currentExo) {
                    currentExo = { name: 'Exercice', maxRM: 0, sets: 0, series: [] };
                }
                
                session.volume += w * r;
                currentExo.sets++;
                const rm = r <= 1 ? w : Math.round(w / (1.0278 - 0.0278 * r));
                if (rm > currentExo.maxRM) currentExo.maxRM = rm;
            } else if (currentExo && currentExo.maxRM > 0) {
                session.exercises.push(currentExo);
                currentExo = null;
            }
        });
        
        if (currentExo && currentExo.maxRM > 0) {
            session.exercises.push(currentExo);
        }
        
        const res = await supabaseClient.from('training_sessions').insert([session]);
        if (res.error) {
            toast('❌ ' + res.error.message);
            return;
        }
        
        await loadData();
        document.getElementById('hevyText').value = '';
        toast('✅ Séance importée !');
    } catch (e) {
        toast('❌ ' + e.message);
    }
}

async function sync() {
    toast('🔄 Synchro...');
    await loadData();
    toast('✅ Synchro OK !');
}

async function logout() {
    await supabaseClient.auth.signOut();
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
    toast('👋 Déconnecté');
}

function showApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
}

function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

window.addEventListener('load', init);
</script>
</body>
</html>
